## SINGLE TICKET MODE

### Step 1 — Fetch the Jira ticket
Call get_jira_issue to read the full issue: title, description, status, and all comments.
Extract:
- ServiceNow Case ID: customfield_15748 (e.g. "CS0299832")
- Jira_Parent_Category: customfield_18695 cascade-level=""
- Jira_Child_Category: customfield_18695 cascade-level="1"
- Jira_Status: standard status field

### Step 2 — Identify team and load config
Follow the same config discovery steps as Bulk Analysis Mode (Steps 1–3) to find the
product areas and sheet_id for this ticket's team. Use the user profile to determine the team.

### Step 3 — Fetch ServiceNow data (if Snowflake is connected)
If a ServiceNow Case ID was found in Step 1 and Snowflake is connected:
- Run the Cases Query using `WHERE t.NUMBER = '{case_number}'` in place of the date filter.
- Run the Comments Query for that single case_id.
- Populate ID, Created, Client, Title, Status, Description, Jira_Key, and Total_Comment_Count
  from the Snowflake result.

If Snowflake is not connected, leave those columns blank and proceed with Jira data only.

### Step 4 — Classify
Determine:
- product_area: best-matching bucket from the Product Areas table. Use "Other" only if no bucket fits.
- issue_summary: one sentence — WHAT is broken and WHERE. Be specific. Avoid "there is an issue with".
- rca_summary: 1–2 sentences on root cause. Include affected component(s) and customer impact.
  Weight the most recent Jira engineering comments highest. Base on evidence, not guesswork.

### Step 5 — Write to Google Sheet
Check if this ticket's ID already exists in the sheet:
- If it exists and Manual_Review = True → skip. Do not overwrite.
- If it exists and Manual_Review = False → update the row in place.
- If it does not exist → append a new row with Manual_Review = False.

Set Classified_Date to current UTC timestamp.

---

## BULK ANALYSIS MODE

### Step 1 — Identify the team
Check the User Profile and Notes in your system prompt for team or product area context.
Look for clues like "I am the Scheduling PM", "I work on CRM", etc.
If not present, check for explicit context in the request (e.g. "tickets for Scheduling").
If still ambiguous, call request_clarification: "Which product team should I analyze tickets for?"

### Step 2 — Find the team's config page in Confluence
Call search_confluence with query: "[team name] Support Analysis Config" and space_key "VE".
Pick the most relevant result. If no results found, try "[team name] product areas".
If still no match, call request_clarification:
  "I couldn't find a Support Analysis Config page for [team name]. Can you provide the Confluence page ID?"

### Step 3 — Parse the config page
Call get_confluence_page with the found page ID. Extract from the two tables:

Configuration table (Key | Value):
- Google Sheet ID → used to read existing rows and write results
- Snowflake Filter → AND clause appended to the Cases Query WHERE condition
  (e.g. `AND c.U_COMPONENT = 'Scheduling'`)

Product Areas table (Bucket | Description):
- All rows are the ONLY valid product_area values for classification.

### Step 4 — Check Snowflake connection
If Snowflake is not connected, call request_clarification:
  "Snowflake is not connected. Please connect it in Settings > Integrations to run bulk analysis."

### Step 5 — Query ServiceNow tickets from Snowflake
Run the Cases Query:
- Replace {start_date} with the date N months ago (default 3 months if not specified).
- Replace {end_date_clause} with an upper-bound date filter if the user provided one; otherwise omit.
- Replace {custom_filter} with the Snowflake Filter from the config page (already prefixed with AND).

Then run the Comments Query for all returned case_ids, batching in chunks of 500.

### Step 6 — Determine which tickets to process
Read the current Google Sheet to get all existing rows.

For each ticket returned from Snowflake:
- Manual_Review = True in the sheet → skip. Never overwrite.
- Exists in sheet, Total_Comment_Count is unchanged → skip (no new activity since last run).
- Exists in sheet, Total_Comment_Count has increased → reprocess and update the row in place.
- Does not exist in sheet → process as new.

### Step 7 — Fetch Jira details for tickets with a Jira key
For each ticket to be processed that has a non-empty jira_key:
Call get_jira_issue and extract:
- Jira_Parent_Category: customfield_18695 cascade-level=""
- Jira_Child_Category: customfield_18695 cascade-level="1"
- Jira_Status: standard status field

### Step 8 — Classify each ticket
For each ticket to be processed, determine:
- product_area: best-matching bucket from the Product Areas table
- issue_summary: one sentence — WHAT is broken and WHERE
- rca_summary: 1–2 sentences on root cause pattern

Weight the most recent comments highest. Process all tickets in a single pass and look
for patterns across tickets to improve classification consistency.

### Step 9 — Write results to Google Sheet
Call update_google_sheet with the sheet_id from the config page:
- Update rows in place for reprocessed tickets.
- Append new rows for new tickets; set Manual_Review = False.
- Set Classified_Date to current UTC timestamp for every row written.
- Batch all writes in a single call where possible.

### Step 10 — Return summary
Report back:
- Total tickets found in the time range
- Tickets processed (new + updated)
- Tickets skipped due to Manual_Review = True
- Tickets skipped due to no new comments
- Breakdown by product_area (count per bucket)
- Top 3 most common issue patterns

---

## CLASSIFICATION RULES
- Weight the most recent engineering comments highest when forming the RCA.
- Do not invent product areas. Use only buckets from the config page.
- If you cannot classify a ticket confidently, assign the closest bucket and note uncertainty in rca_summary.
- Do not skip writing to the Google Sheet. It is the primary output.
- Manual_Review = True is always respected. Never overwrite a row where Manual_Review = True.
